name: deploy-staging

# Auto on main, manual via workflow_dispatch.
#
# Until the bootstrap Terraform has been applied and these repo variables
# are populated, every job in this workflow short-circuits via the `guard`
# job. The workflow itself stays valid so it shows up green in the Actions
# tab instead of confusing reviewers with a permanent failure.
#
# Required vars (set via Settings → Secrets and variables → Actions):
#   GCP_WIF_PROVIDER · GCP_DEPLOYER_SA · ARTIFACT_REPO
#   GCP_PROJECT_ID_STAGING · STAGING_REGION · STAGING_HOST
#   STAGING_BASE_URL · NOTIFICATION_EMAIL

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "ARCHITECTURE.md"
      - "CLAUDE.md"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-24.04
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          WIF: ${{ vars.GCP_WIF_PROVIDER }}
          REPO: ${{ vars.ARTIFACT_REPO }}
          PROJECT: ${{ vars.GCP_PROJECT_ID_STAGING }}
        run: |
          if [ -n "$WIF" ] && [ -n "$REPO" ] && [ -n "$PROJECT" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "::notice::All required vars present — running staging deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping staging deploy — required vars not set. See .github/CI.md."
          fi

  deploy:
    needs: guard
    if: needs.guard.outputs.configured == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: staging
    env:
      IMAGE_TAG: ${{ github.sha }}
      TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
      TF_VAR_host: ${{ vars.STAGING_HOST }}
      TF_VAR_artifact_repo: ${{ vars.ARTIFACT_REPO }}
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_notification_email: ${{ vars.NOTIFICATION_EMAIL }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.ARTIFACT_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v4

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ vars.ARTIFACT_REPO }}/api:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ vars.ARTIFACT_REPO }}/frontend:${{ github.sha }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - run: terraform -chdir=infra/envs/staging init
      - run: terraform -chdir=infra/envs/staging apply -auto-approve

      - name: Alembic migration via Cloud Run Job
        run: |
          gcloud run jobs deploy ai-stt-migrate \
            --region=${{ vars.STAGING_REGION }} \
            --image=${{ vars.ARTIFACT_REPO }}/api:${{ github.sha }} \
            --command=alembic --args=upgrade,head \
            --service-account=ai-stt-stt-worker@${{ vars.GCP_PROJECT_ID_STAGING }}.iam.gserviceaccount.com \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --vpc-connector=ai-stt-stg-conn-${{ vars.STAGING_REGION }} \
            --vpc-egress=private-ranges-only \
            --max-retries=2 \
            --quiet
          gcloud run jobs execute ai-stt-migrate \
            --region=${{ vars.STAGING_REGION }} --wait --quiet

      - name: Update Cloud Run services with new image
        run: |
          set -e
          IMAGE_API=${{ vars.ARTIFACT_REPO }}/api:${{ github.sha }}
          IMAGE_FE=${{ vars.ARTIFACT_REPO }}/frontend:${{ github.sha }}
          REGION=${{ vars.STAGING_REGION }}
          for svc in ai-stt-api ai-stt-stt-worker ai-stt-llm-worker ai-stt-outbox; do
            gcloud run services update "$svc" --region="$REGION" --image="$IMAGE_API" --quiet
          done
          gcloud run services update ai-stt-frontend --region="$REGION" --image="$IMAGE_FE" --quiet
