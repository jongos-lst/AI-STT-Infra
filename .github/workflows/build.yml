name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "ARCHITECTURE.md"
      - "CLAUDE.md"
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    # Skip cleanly until the bootstrap Terraform has been run and these
    # repo variables are populated — see .github/CI.md for the list.
    if: vars.GCP_WIF_PROVIDER != '' && vars.ARTIFACT_REPO != ''
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    strategy:
      matrix:
        include:
          - name: api
            context: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up gcloud (for docker auth)
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.ARTIFACT_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ vars.ARTIFACT_REPO }}/${{ matrix.name }}:${{ steps.tag.outputs.tag }}
            ${{ vars.ARTIFACT_REPO }}/${{ matrix.name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Trivy scan pushed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.ARTIFACT_REPO }}/${{ matrix.name }}:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        env:
          IMAGE: ${{ vars.ARTIFACT_REPO }}/${{ matrix.name }}:${{ steps.tag.outputs.tag }}
        run: cosign sign --yes "$IMAGE"
