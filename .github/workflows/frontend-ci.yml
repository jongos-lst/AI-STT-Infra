name: frontend-ci

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm install (not ci) — works around https://github.com/npm/cli/issues/4828
      # where ci skips the platform-specific optional native binaries that
      # vitest's rollup native imports require at runtime.
      - run: npm install --no-fund --no-audit

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest
        run: npm test

      - name: Build (Next standalone)
        run: npm run build
